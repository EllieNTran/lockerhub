name: "CodeQL Config"

paths-ignore:
  - '**/tests/**'
  - '**/test/**'
  - '**/*.test.ts'
  - '**/*.test.js'
  - '**/*.spec.ts'
  - '**/*.spec.js'

query-filters:
  - exclude:
      id: js/missing-rate-limiting
      paths:
        - '**/tests/**'
        - '**/test/**'
        - '**/*.test.ts'
        - '**/*.test.js'
        - '**/*.spec.ts'
        - '**/*.spec.js'
