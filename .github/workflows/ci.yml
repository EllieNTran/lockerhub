name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: 'API', path: 'apps/api', type: 'typescript' }
          - { name: 'Webapp', path: 'apps/webapp', type: 'typescript' }
          - { name: 'Auth', path: 'services/auth', type: 'typescript' }
          - { name: 'Admin', path: 'services/admin', type: 'python' }
          - { name: 'Booking', path: 'services/booking', type: 'python' }
    steps:
      - uses: actions/checkout@v4

      # TypeScript projects
      - name: Setup Node.js
        if: matrix.service.type == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Node dependencies
        if: matrix.service.type == 'typescript'
        working-directory: ${{ matrix.service.path }}
        run: npm ci

      - name: Run ESLint
        if: matrix.service.type == 'typescript'
        working-directory: ${{ matrix.service.path }}
        run: npm run lint

      - name: Run TypeScript check
        if: matrix.service.type == 'typescript'
        working-directory: ${{ matrix.service.path }}
        run: npm run typecheck

      # Python projects
      - name: Setup Python
        if: matrix.service.type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ${{ matrix.service.path }}/requirements.txt

      - name: Install Black
        if: matrix.service.type == 'python'
        run: pip install black

      - name: Run Black check
        if: matrix.service.type == 'python'
        working-directory: ${{ matrix.service.path }}
        run: black --check src/
