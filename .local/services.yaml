services:
  webapp:
    build:
      context: ../apps/webapp
    ports:
      - 3001:80
    environment:
      - PORT=80
      - LOCALHOST_MODE=true
      - VITE_API_URL=http://api
      - VITE_AUTH_URL=http://auth

  api:
    build:
      context: ../apps/api
    ports:
      - 3002:80
    environment:
      - PORT=80
      - LOCALHOST_MODE=true
      - AUTH_SERVICE_URL=http://auth

  auth:
    build:
      context: ../services/auth
    ports:
      - 3003:80
    environment:
      - PORT=80
      - NODE_ENV=development
      - LOG_LEVEL=info
      - ACCESS_TOKEN_EXPIRY=15m
      - REFRESH_TOKEN_EXPIRY=7d
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - LOCALHOST_MODE=true
      - NOTIFICATIONS_SERVICE_URL=http://notifications
      - APP_URL=http://webapp
    depends_on:
      postgres:
        condition: service_healthy

  booking:
    build:
      context: ../services/booking
    ports:
      - 3004:80
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=80
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_MIN_POOL_SIZE=5
      - DB_MAX_POOL_SIZE=20
      - AUTH_SERVICE_URL=http://auth
      - NOTIFICATIONS_SERVICE_URL=http://notifications
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    build:
      context: ../services/admin
    ports:
      - 3005:80
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=80
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_MIN_POOL_SIZE=5
      - DB_MAX_POOL_SIZE=20
      - AUTH_SERVICE_URL=http://auth
      - NOTIFICATIONS_SERVICE_URL=http://notifications
    depends_on:
      postgres:
        condition: service_healthy

  notifications:
    build:
      context: ../services/notifications
    ports:
      - 3006:80
    environment:
      - PORT=80
      - NODE_ENV=development
      - LOG_LEVEL=info
      - ACCESS_TOKEN_EXPIRY=15m
      - REFRESH_TOKEN_EXPIRY=7d
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - LOCALHOST_MODE=true
      - RESEND_API_KEY=${RESEND_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
