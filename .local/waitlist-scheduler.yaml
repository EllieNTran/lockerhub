services:
  waitlist-scheduler:
    image: node:20-alpine
    container_name: lockerhub-waitlist-scheduler
    restart: unless-stopped
    working_dir: /app
    environment:
      - BOOKING_SERVICE_URL=http://booking
      - INTERVAL_MINUTES=15
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    volumes:
      - ../scripts/waitlist/waitlist-scheduler.js:/app/scheduler.js:ro
    command: node scheduler.js
    depends_on:
      booking:
        condition: service_started
    networks:
      - default
